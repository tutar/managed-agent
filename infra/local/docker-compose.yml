services:
  postgres:
    image: postgres:16-alpine
    container_name: managed-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: managed_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - managed-agent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d managed_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  managed-agent-postgres-data:
