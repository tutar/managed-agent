apiVersion: v1
kind: PersistentVolume
metadata:
  name: managed-agent-sandbox-storage
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: managed-agent-local
  hostPath:
    path: /var/local/managed-agent
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: managed-agent-sandbox-storage
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: managed-agent-local
  volumeName: managed-agent-sandbox-storage
