openapi: 3.1.0
info:
  title: Managed Agent API
  version: 0.1.0
  summary: Public frontend-facing HTTP and SSE contract for the managed-agent platform.
  description: >
    This specification defines the current browser-facing boundary exposed by
    `apps/managed-agent-api`. It is intentionally scoped to the Web UI and
    other first-party clients. Internal worker transport is excluded.
servers:
  - url: http://127.0.0.1:4173
    description: Local development server
tags:
  - name: Health
  - name: Auth
  - name: LLM Providers
  - name: Sessions
  - name: Triggers
paths:
  /health:
    get:
      tags: [Health]
      summary: Read API health status
      operationId: getHealth
      responses:
        "200":
          description: API process is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/register:
    post:
      tags: [Auth]
      summary: Register one personal user account
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered and current authenticated user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/login:
    post:
      tags: [Auth]
      summary: Create one cookie-backed login session
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login session established and current authenticated user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current login session
      operationId: logoutUser
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Current login session invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me:
    get:
      tags: [Auth]
      summary: Read the current authenticated user
      operationId: getCurrentUser
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/sessions:
    get:
      tags: [Sessions]
      summary: List recent sessions for the current authenticated user
      operationId: listCurrentUserSessions
      description: >
        Preferred browser-facing recent-session list endpoint. The current
        authenticated user is resolved from the login session rather than an
        explicit `userId` path parameter.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
      responses:
        "200":
          description: Recent sessions ordered by latest activity first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /llm-provider-types:
    get:
      tags: [LLM Providers]
      summary: List supported provider types
      operationId: listLlmProviderTypes
      responses:
        "200":
          description: Static provider-type catalog exposed to the Settings UI
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmProviderType"
  /me/llm-providers:
    get:
      tags: [LLM Providers]
      summary: List provider configs owned by the current user
      operationId: listUserLlmProviders
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: User-owned provider configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmProviderConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [LLM Providers]
      summary: Create one user-owned provider config
      operationId: createUserLlmProvider
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertLlmProviderConfigRequest"
      responses:
        "200":
          description: Provider config persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/llm-providers/{providerConfigId}:
    patch:
      tags: [LLM Providers]
      summary: Update one user-owned provider config
      operationId: updateUserLlmProvider
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchLlmProviderConfigRequest"
      responses:
        "200":
          description: Provider config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [LLM Providers]
      summary: Delete one user-owned provider config
      operationId: deleteUserLlmProvider
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
      responses:
        "204":
          description: Provider config deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/llm-providers/{providerConfigId}/validate:
    post:
      tags: [LLM Providers]
      summary: Validate one user-owned provider config
      operationId: validateUserLlmProvider
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderValidationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/llm-providers/{providerConfigId}/oauth/start:
    post:
      tags: [LLM Providers]
      summary: Start an OAuth browser flow for one user-owned provider config
      operationId: startUserLlmProviderOauthFlow
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmProviderOAuthStartRequest"
      responses:
        "200":
          description: OAuth flow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderOAuthFlow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/llm-providers/{providerConfigId}/oauth/flows/{flowId}:
    get:
      tags: [LLM Providers]
      summary: Get one in-flight OAuth browser flow
      operationId: getUserLlmProviderOauthFlow
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
        - $ref: "#/components/parameters/OAuthFlowIdPath"
      responses:
        "200":
          description: OAuth flow status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderOAuthFlow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/llm-providers/{providerConfigId}/oauth-account:
    delete:
      tags: [LLM Providers]
      summary: Remove the stored OAuth credential from one user-owned provider config
      operationId: deleteUserLlmProviderOauthAccount
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProviderConfigIdPath"
      responses:
        "200":
          description: Provider config updated after credential removal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmProviderConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /oauth/llm-provider-flows/openai-codex/callback:
    get:
      tags: [LLM Providers]
      summary: Browser callback target for OpenAI Codex OAuth flows
      operationId: completeOpenAICodexOauthCallback
      parameters:
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: code
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OAuth callback completed
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Callback query is missing required parameters
          content:
            text/html:
              schema:
                type: string
        "404":
          description: OAuth flow was not found
          content:
            text/html:
              schema:
                type: string
        "500":
          description: OAuth callback failed
          content:
            text/html:
              schema:
                type: string
  /sessions:
    post:
      tags: [Sessions]
      summary: Create a new session and stream the first assistant response
      operationId: createSession
      description: >
        Protected browser-facing endpoint. The authenticated user should be
        resolved from the login session. The `userId` query parameter remains a
        development/compatibility path and is not the long-term primary browser
        identity source.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdQuery"
        - $ref: "#/components/parameters/IncludeProcessQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session accepted and streamed as SSE
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Server-Sent Events stream. Each frame contains one `event:`
                  line and one JSON `data:` line. Clients should treat the
                  event types listed under `components.x-sseEvents` as the
                  stable browser contract.
              examples:
                createSessionStream:
                  value: |-
                    event: session.created
                    data: {"sessionId":"sess_1","sessionName":"介绍下你自己。"}

                    event: message.accepted
                    data: {"sessionId":"sess_1","entry":{"id":"entry_2","parentId":null,"createdAt":"2026-05-16T11:58:00.000Z","messageType":"user","content":[{"type":"text","text":"介绍下你自己。"}]}}

                    event: final.output.delta
                    data: {"sessionId":"sess_1","entryId":"entry_4","parentId":"entry_3","text":"我是"}

                    event: final.output.delta
                    data: {"sessionId":"sess_1","entryId":"entry_4","parentId":"entry_3","text":"一个编程助手。"}

                    event: final.output.completed
                    data: {"sessionId":"sess_1","entryId":"entry_4"}
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
  /sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Read one session transcript snapshot
      operationId: getSession
      description: >
        Protected browser-facing endpoint. Access is scoped to the current
        authenticated user.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Session transcript snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetailResponse"
        "404":
          $ref: "#/components/responses/SessionNotFound"
    patch:
      tags: [Sessions]
      summary: Rename a session
      operationId: updateSession
      description: >
        V1 only supports updating `sessionName`. Running sessions may still be
        renamed. Access is scoped to the current authenticated user.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: Session updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/SessionNotFound"
    delete:
      tags: [Sessions]
      summary: Archive a session by soft delete
      operationId: deleteSession
      description: >
        This endpoint performs an irreversible soft delete. Archived sessions no
        longer appear in the recent-session list and their transcript is not
        recoverable through public APIs. Running sessions cannot be deleted.
        Access is scoped to the current authenticated user.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "204":
          description: Session archived successfully
        "409":
          $ref: "#/components/responses/Conflict"
        "404":
          $ref: "#/components/responses/SessionNotFound"
  /sessions/{sessionId}/messages:
    post:
      tags: [Sessions]
      summary: Append one user message and stream the continued assistant response
      operationId: submitMessage
      description: >
        V1 expects clients to avoid submitting new messages while the session
        status is `running`. The standalone web UI enforces this in the input
        layer. The server does not yet reject concurrent submissions. The
        authenticated user should be resolved from the login session. The
        `userId` query parameter remains a development/compatibility path.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
        - $ref: "#/components/parameters/UserIdQuery"
        - $ref: "#/components/parameters/IncludeProcessQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Message accepted and streamed as SSE
          content:
            text/event-stream:
              schema:
                type: string
                description: Same SSE contract as `POST /sessions`
              examples:
                continueSessionStream:
                  value: |-
                    event: message.accepted
                    data: {"sessionId":"sess_1","entry":{"id":"entry_5","parentId":"entry_4","createdAt":"2026-05-16T11:59:00.000Z","messageType":"user","content":[{"type":"text","text":"继续"}]}}

                    event: final.output.delta
                    data: {"sessionId":"sess_1","entryId":"entry_7","parentId":"entry_6","text":"继续处理当前请求。"}

                    event: final.output.completed
                    data: {"sessionId":"sess_1","entryId":"entry_7"}
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/SessionNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /sessions/{sessionId}/cancel:
    post:
      tags: [Sessions]
      summary: Request cancellation for the current in-flight session run
      operationId: cancelSession
      description: >
        Protected browser-facing endpoint. Access is scoped to the current
        authenticated user.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Cancel request acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelSessionResponse"
        "404":
          $ref: "#/components/responses/SessionNotFound"
  /users/{userId}/sessions:
    get:
      tags: [Sessions]
      summary: List recent sessions for one user
      operationId: listUserSessions
      description: >
        Returns active, non-archived sessions sorted by `lastActiveAt desc,
        sessionId desc`. This path is retained as a transitional/compatibility
        interface. Browser-facing authenticated clients should prefer
        `GET /me/sessions`.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
      responses:
        "200":
          description: Recent sessions ordered by latest activity first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /triggers:
    post:
      tags: [Triggers]
      summary: Create a trigger placeholder
      operationId: createTrigger
      security:
        - SessionCookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTriggerRequest"
      responses:
        "200":
          description: Trigger accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: managed_agent_session
  parameters:
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    UserIdQuery:
      name: userId
      in: query
      required: false
      description: >
        Development/compatibility identity override. Authenticated browser
        clients should use the login session as the primary user context source
        instead of passing `userId` explicitly.
      schema:
        type: string
    ProviderConfigIdPath:
      name: providerConfigId
      in: path
      required: true
      schema:
        type: string
    OAuthFlowIdPath:
      name: flowId
      in: path
      required: true
      schema:
        type: string
    IncludeProcessQuery:
      name: includeProcess
      in: query
      required: false
      description: Include `process.*` and `action.*` SSE events in the stream.
      schema:
        type: boolean
        default: true
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of sessions to return.
      schema:
        type: integer
        default: 20
    CursorQuery:
      name: cursor
      in: query
      required: false
      description: Pagination cursor string.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: bad_request
              message: Invalid request parameters
    Unauthorized:
      description: Request requires an authenticated login session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: unauthorized
              message: login session required
    SessionNotFound:
      description: Session does not exist or has been archived
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: session_not_found
              message: session sess_missing not found
    Conflict:
      description: Request conflicts with current session lifecycle state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: session_state_conflict
              message: session sess_running cannot be archived while running
    NotFound:
      description: Requested resource does not exist in the current user scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: not_found
              message: resource not found
    InternalError:
      description: Request failed before a normal response could be completed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: internal_error
              message: request body too large
  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    CurrentUserResponse:
      type: object
      required: [userId, username, status, createdAt]
      properties:
        userId:
          type: string
        username:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: [string, "null"]
          format: date-time
    LogoutResponse:
      type: object
      required: [loggedOut]
      properties:
        loggedOut:
          type: boolean
          const: true
    LlmProviderModel:
      type: object
      required: [modelId, displayName, supportsReasoning]
      properties:
        modelId:
          type: string
        displayName:
          type: string
        supportsReasoning:
          type: boolean
        supportedThinkingLevels:
          type: array
          items:
            type: string
    OAuthCredential:
      type: object
      required: [access, refresh, expires]
      properties:
        access:
          type: string
        refresh:
          type: string
        expires:
          type: integer
          minimum: 0
        accountId:
          type: string
        enterpriseUrl:
          type: string
    LlmProviderType:
      type: object
      required:
        [
          providerType,
          displayName,
          authMode,
          runtimeProviderId,
          usesBuiltInProvider,
          supportsCustomBaseUrl,
          supportsCustomHeaders,
          baseUrlRequired,
          defaultModels,
          defaultThinkingLevel,
          secretFields
        ]
      properties:
        providerType:
          type: string
        displayName:
          type: string
        authMode:
          type: string
          enum: [api_key, oauth, none]
        runtimeProviderId:
          type: string
        usesBuiltInProvider:
          type: boolean
        apiType:
          type: string
          enum:
            [openai-completions, openai-responses, anthropic-messages, google-generative-ai]
        supportsCustomBaseUrl:
          type: boolean
        supportsCustomHeaders:
          type: boolean
        baseUrlRequired:
          type: boolean
        defaultModels:
          type: array
          items:
            $ref: "#/components/schemas/LlmProviderModel"
        defaultThinkingLevel:
          type: string
        secretFields:
          type: array
          items:
            type: string
            enum: [apiKey, oauthCredential]
        helpText:
          type: string
    LlmProviderConfig:
      type: object
      required:
        [
          providerConfigId,
          providerType,
          displayName,
          authMode,
          headers,
          availableModels,
          defaultModelId,
          defaultThinkingLevel,
          enabled,
          hasStoredCredential
        ]
      properties:
        providerConfigId:
          type: string
        providerType:
          type: string
        displayName:
          type: string
        authMode:
          type: string
          enum: [api_key, oauth, none]
        baseUrl:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        availableModels:
          type: array
          items:
            $ref: "#/components/schemas/LlmProviderModel"
        defaultModelId:
          type: string
        defaultThinkingLevel:
          type: string
        enabled:
          type: boolean
        hasStoredCredential:
          type: boolean
    UpsertLlmProviderConfigRequest:
      type: object
      required: [providerType]
      properties:
        providerType:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        baseUrl:
          type: string
          minLength: 1
        headers:
          type: object
          additionalProperties:
            type: string
        availableModels:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        defaultModelId:
          type: string
          minLength: 1
        defaultThinkingLevel:
          type: string
          minLength: 1
        enabled:
          type: boolean
        apiKey:
          type: string
          minLength: 1
        oauthCredential:
          $ref: "#/components/schemas/OAuthCredential"
    PatchLlmProviderConfigRequest:
      type: object
      properties:
        providerType:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        baseUrl:
          type: string
          minLength: 1
        headers:
          type: object
          additionalProperties:
            type: string
        availableModels:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        defaultModelId:
          type: string
          minLength: 1
        defaultThinkingLevel:
          type: string
          minLength: 1
        enabled:
          type: boolean
        apiKey:
          type: string
          minLength: 1
        oauthCredential:
          $ref: "#/components/schemas/OAuthCredential"
    LlmProviderValidationResponse:
      type: object
      required: [providerConfigId, valid, errors]
      properties:
        providerConfigId:
          type: string
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
    LlmProviderOAuthStartRequest:
      type: object
      properties:
        enterpriseUrl:
          type: string
          minLength: 1
    LlmProviderOAuthFlow:
      type: object
      required: [flowId, status, expiresAt, usesManagedCallback]
      properties:
        flowId:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        authUrl:
          type: string
        instructions:
          type: string
        error:
          type: string
        expiresAt:
          type: integer
        completedAt:
          type: string
        usesManagedCallback:
          type: boolean
    ContentItem:
      oneOf:
        - $ref: "#/components/schemas/TextContentItem"
        - $ref: "#/components/schemas/ImageContentItem"
        - $ref: "#/components/schemas/VideoContentItem"
        - $ref: "#/components/schemas/ToolCallContentItem"
    InputContentItem:
      oneOf:
        - $ref: "#/components/schemas/TextContentItem"
        - $ref: "#/components/schemas/ImageContentItem"
        - $ref: "#/components/schemas/VideoContentItem"
    TextContentItem:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: text
        text:
          type: string
    ImageContentItem:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          const: image
        url:
          type: string
    VideoContentItem:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          const: video
        url:
          type: string
    ToolCallContentItem:
      type: object
      required: [type, toolCallId, toolName, status]
      description: >
        `arguments` may appear for `started`, `completed`, and `error`.
        `result` only appears for `completed`. `error` only appears for
        `error`.
      properties:
        type:
          type: string
          const: tool_call
        toolCallId:
          type: string
        toolName:
          type: string
        status:
          type: string
          enum: [started, completed, error]
        arguments:
          type: string
          description: JSON encoded string of tool arguments
        result:
          type: string
          description: Result/output of the tool call
        error:
          type: string
          description: Failure summary for `status=error`
    SessionInput:
      type: object
      required: [content]
      properties:
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InputContentItem"
    CreateSessionRequest:
      type: object
      required: [providerConfigId, input]
      properties:
        providerConfigId:
          type: string
          description: User-owned provider config selected for this session.
        modelId:
          type: string
          description: Explicit model id configured under the selected provider.
        thinkingLevel:
          type: string
          description: >
            Optional thinking level requested for the selected model. Only valid
            when the selected model exposes `supportedThinkingLevels`.
        input:
          $ref: "#/components/schemas/SessionInput"
    UpdateSessionRequest:
      type: object
      additionalProperties: false
      description: V1 only supports renaming a session.
      properties:
        sessionName:
          type: string
          description: New name/title for the session
          minLength: 1
    CreateMessageRequest:
      type: object
      required: [input]
      properties:
        input:
          $ref: "#/components/schemas/SessionInput"
    CreateTriggerRequest:
      type: object
      properties:
        triggerType:
          type: string
          default: manual
    SessionEntry:
      type: object
      required: [id, parentId, createdAt, messageType, content]
      properties:
        id:
          type: string
        parentId:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        messageType:
          type: string
          enum: [user, process, assistant]
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentItem"
    SessionDetailResponse:
      type: object
      required:
        [sessionId, sessionName, status, model, thinkingLevel, createdAt, lastActiveAt, entries]
      properties:
        sessionId:
          type: string
        sessionName:
          type: string
        status:
          type: string
          enum: [idle, running, error]
        model:
          type: string
          description: Resolved runtime model id in `provider/model` format.
        providerConfigId:
          type: string
        providerType:
          type: string
        thinkingLevel:
          type: string
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SessionEntry"
    SessionListItem:
      type: object
      required: [sessionId, sessionName, status, createdAt, lastActiveAt]
      properties:
        sessionId:
          type: string
        sessionName:
          type: string
        status:
          type: string
          enum: [idle, running, error]
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
    UserSessionsResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionListItem"
        nextCursor:
          type: [string, "null"]
          description: Opaque cursor for the next page; null when exhausted
        hasMore:
          type: boolean
          description: Whether another page can be fetched with `nextCursor`
    CancelSessionResponse:
      type: object
      required: [sessionId, accepted]
      properties:
        sessionId:
          type: string
        accepted:
          type: boolean
    TriggerAcceptedResponse:
      type: object
      required: [triggerId, accepted, triggerType]
      properties:
        triggerId:
          type: string
        accepted:
          type: boolean
          const: true
        triggerType:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
  x-sseEvents:
    - name: session.created
      direction: server-to-client
      description: Emitted once when a new session is created.
      payload:
        type: object
        required: [sessionId, sessionName]
        properties:
          sessionId:
            type: string
          sessionName:
            type: string
    - name: message.accepted
      direction: server-to-client
      description: Emitted after the user message is persisted.
      payload:
        type: object
        required: [sessionId, entry]
        properties:
          sessionId:
            type: string
          entry:
            $ref: "#/components/schemas/SessionEntry"
    - name: process.delta
      direction: server-to-client
      description: Optional process-layer progress event.
      payload:
        type: object
        required: [sessionId, entryId, parentId, text]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          text:
            type: string
    - name: action.started
      direction: server-to-client
      description: Optional tool/action start event.
      payload:
        type: object
        required: [sessionId, entryId, parentId, toolCallId, name]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          toolCallId:
            type: string
          name:
            type: string
          arguments:
            type: string
    - name: action.completed
      direction: server-to-client
      description: Optional tool/action completion event.
      payload:
        type: object
        required: [sessionId, entryId, parentId, toolCallId, name]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          toolCallId:
            type: string
          name:
            type: string
          result:
            type: string
    - name: action.failed
      direction: server-to-client
      description: Optional tool/action failure event.
      payload:
        type: object
        required: [sessionId, entryId, parentId, toolCallId, name, error]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          toolCallId:
            type: string
          name:
            type: string
          arguments:
            type: string
          error:
            type: string
    - name: final.output.delta
      direction: server-to-client
      description: Streamed assistant output chunk.
      payload:
        type: object
        required: [sessionId, entryId, parentId, text]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          text:
            type: string
    - name: final.output.completed
      direction: server-to-client
      description: Marks the end of one assistant response stream.
      payload:
        type: object
        required: [sessionId, entryId]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
    - name: run.failed
      direction: server-to-client
      description: >
        Emitted when worker execution fails after the user message was already
        accepted.
      payload:
        type: object
        required: [sessionId, entryId, parentId, code, message]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          code:
            type: string
          message:
            type: string
    - name: run.cancelled
      direction: server-to-client
      description: >
        Emitted when the active run is interrupted by `POST /sessions/{sessionId}/cancel`.
        After this event, the SSE stream is closed without a `final.output.completed`.
      payload:
        type: object
        required: [sessionId, entryId, parentId, message]
        properties:
          sessionId:
            type: string
          entryId:
            type: string
          parentId:
            type: string
          message:
            type: string
